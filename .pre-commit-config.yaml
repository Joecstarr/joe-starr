repos:
    - repo: local
      hooks:
          - id: astro
            name: astro
            language: system
            entry: prettier --check --log-level warn
            exclude:
                glob:
                    - ".github/**/*.*"
            files:
                glob:
                    - "**/*.astro"
                    - "**/*.ts"
                    - "**/*.js"
                    - "**/*.jsx"
                    - "**/*.tsx"
                    - "**/*.css"
          - id: toml
            name: toml
            language: system
            entry: tombi format --check
            exclude:
                glob:
                    - ".github/**/*.*"
            files:
                glob:
                    - "**/*.toml"
          - id: md
            name: md
            language: system
            entry: rumdl check
            exclude:
                glob:
                    - ".github/**/*.*"
            files:
                glob:
                    - "**/*.md"
                    - "**/*.mdx"

