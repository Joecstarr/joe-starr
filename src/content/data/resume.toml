[[sections.subsections]]
name = "Teaching Assistant / Research Fellow"
subheader = "[University of Iowa](https://uiowa.edu)"
dates = "Aug 2021 - May 2025"
summary = "* Conducted original research.\n* Developed original and modified existing courses for use in an\n  undergraduate research training program.\n* Led undergraduates as instructor of record.\n* Led undergraduate and graduate students as discussion leader.\n* Tutored undergraduate and graduate students in the math tutorial lab."

[[sections.subsections]]
name = "Software Engineer"
subheader = "[Western Diversified Plastics](https://westerndp.com/)"
dates = "Dec 2020 - Aug 2021"
summary = "* Design and implementation of ASPICE process tooling for:\n    - Parsing of customer requirements.\n    - Tracing of customer requirements.\n    - Internal requirements modeling process design.\n    - Generation of project health metrics and their analysis.\n    - Reporting project health to project management tooling.\n* MICROSAR sourcing (technical contact)\n    - MICROSAR\n    - Flash Bootloader\n    - vVIRTUALtarget\n    - vTESTstudio\n* Standing up product prototype (basic IO for\n  hardware verification).\n* General development of AUTOSAR application components.\n* Design and implementation of continuous integration (CI) process and system."

[[sections.subsections]]
name = "Project Engineer"
subheader = "[Vector North America](https://Vector.com)"
dates = "Jan 2017 - Dec 2020"
summary = "##### Project Architect\n* Responsible for the complete architectural design and direction of a customer project.\n* Analysis of customer requirements and negotiation of acceptance for those requirements.\n* Planning of team development activities.\n* Design and implementation of safety use case (ASIL A)\n\n##### AUTOSAR Projects\n* Design and implementation of AUTOSAR application components\n* Design and implementation of AUTOSAR MCAL components\n    - GPT\n    - SPI\n    - FLS (partial)\n    - ADC (partial)\n* Flash Bootloader design and implementation.\n* Design and implementation of continuous integration (CI) process and system.\n\n##### Flash Bootloader Integration\n* Integration and testing of off-the-shelf software solutions with a focus on *Flash Bootloader* integrations.\n* Worked with new technologies such as Ethernet, CAN-FD, and Security.\n* Support customers in use of the *Flash Bootloader* product."

[[sections]]
title = "Education"
icon = "fa-solid fa-school"

[[sections.subsections]]
name = "Doctor of Philosophy in Mathematics"
subheader = "University of Iowa"
dates = "Fall 2021 - Fall 2025 (Defended 8/18/25)"
summary = "In my thesis titled __The Tanglenomicon: Tabulation of Arborescent\nTangles__, I enumerated a class of knot-theoretic objects called\narborescent tangles. I identified a unique (up to isotopy)\nrepresentative for each arborescent tangle, the Right Leaning\nIdentity Tangle Tree (RLITT). I then created and proved correct\nthe abstract algorithms needed for enumeration of RLITT.\nFurthermore, I designed a process architecture that connects\nmathematical research with software design, including formal\ndesign and validation activities. Within that process I developed\na modular software architecture in C for general computational\nknot theoretic use cases. Using this architecture, I implemented\nmy theoretical algorithms and tabulated arborescent tangles up to\n18 crossings."

