[[sections]]
title = "Teaching"
icon = "fa-solid fa-pencil"

[[sections.subsections]]
name = "ISA:4041"
subheader = "Primary Instructor"
summary = "Structure for development, planning, and implementation of a\nculminating project for the Iowa Sciences Academy; students\ndedicate three to five hours per week to the project and are\nencouraged to connect their projects to community issues or\nproblem; integration of external learning experiences and\nactivities including interviews, scientific observations, or\ninternships.\n[Course Listing](https://myui.uiowa.edu/my-ui/courses/details.page?ci=173792&id=1034182)"
dates = "Spring 2025"

[[sections.subsections]]
name = "ISA:1040"
subheader = "Primary Instructor"
summary = "Professional and career development; tours of scientific\nresearch facilities and laboratories on campus; network with\nprofessors and graduate students; explore different types of\nresearch environments on campus; learn how to identify and\ncontact potential research mentors.\n[Course Listing](https://myui.uiowa.edu/my-ui/courses/details.page?ci=173793&id=1032561)"
dates = "Spring 2025"

[[sections.subsections]]
name = "ISA:4040"
subheader = "Primary Instructor"
summary = "Scientific teaching principles (e.g., backwards design, active\nlearning, formative assessment); students develop a teaching\nunit based on some aspect of their research and teach it to the\nclass in preparation for future interviews where the ability to\nexplain the background and significance for their research is a\nhighly valued skill. Requirements: minimum of 60 s.h. earned,\njunior or senior standing, and undergraduate research experience.\n[Course Listing](https://myui.uiowa.edu/my-ui/courses/details.page?ci=173795&id=1037535)"
dates = "Fall 2024"

[[sections.subsections]]
name = "MATH:5760"
subheader = "Graduate Assistant"
summary = "Topics in mathematical biology; canonical mathematical modeling\nand analysis of problems in the biological sciences\n(data analysis and introduction to machine learning).\n[Course Listing](https://myui.uiowa.edu/my-ui/courses/dashboard.page?q.courseSubject=MATH&q.courseNumber=5760&showResults=1)"
dates = "Spring 2024"

[[sections.subsections]]
name = "MATH:1005"
subheader = "Primary Instructor"
summary = "Algebraic techniques, equations and inequalities,\nfunctions and graphs, exponential and logarithmic functions,\nsystems of equations and inequalities.\n[Course Listing](https://myui.uiowa.edu/my-ui/courses/dashboard.page?q.courseSubject=MATH&q.courseNumber=1005&showResults=1)"
dates = "Fall 2022, Fall 2023"

[[sections.subsections]]
name = "MATH:1350"
subheader = "Discussion Section Leader"
summary = "Algebraic techniques and modeling; quantitative methods for treating\nproblems that arise in management and economic sciences; topics include algebra\ntechniques, functions and functional models, exponential and logarithmic functions\nand models, and a thorough introduction to differential calculus; examples\nand applications from management, economic sciences, and related areas; for\nstudents planning to major in business.\n[Course Listing](https://myui.uiowa.edu/my-ui/courses/dashboard.page?q.courseSubject=MATH&q.courseNumber=1350&showResults=1)"
dates = "Fall 2021, Spring 2022,<br/>Spring 2024"

